# Cambrian-W Part1 Long Videos
task: cambw_part1_long
description: "Cambrian-W part1 long videos (40 videos, 603 docs)"
dataset_path: json
dataset_name: null
dataset_kwargs:
  data_files:
    test: lmms_eval/tasks/cambw/data/part1_long.jsonl
test_split: test
doc_to_text: !function utils.doc_to_text
doc_to_visual: !function utils.doc_to_visual
doc_to_target: "answer"
process_results: !function utils.process_results
output_type: generate_until
# lmms-eval standard config
fewshot_split: null
fewshot_config: null
num_fewshot: 0
# Metrics configuration
metric_list:
  - metric: accuracy
    aggregation: !function utils.aggregate_accuracy
    higher_is_better: true
  - metric: mra
    aggregation: !function utils.aggregate_mra
    higher_is_better: true
# Generation configuration
generation_kwargs:
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  num_beams: 1
  do_sample: false
# Metadata
metadata:
  version: 1.0
  source: Cambrian-W Benchmark
